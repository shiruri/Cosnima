  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    body { overflow: hidden; }

    <a href="../index.html" class="nav-logo" aria-label="Cosnima home">
      <svg class="nav-logo-beaver" viewBox="0 0 36 36" fill="none">
        <ellipse cx="18" cy="21" rx="9" ry="8" fill="#c87a50"/>
        <ellipse cx="18" cy="22.5" rx="5.5" ry="5" fill="#e8a878"/>
        <ellipse cx="18" cy="13" rx="7.5" ry="6.5" fill="#c87a50"/>
        <ellipse cx="14.5" cy="14.5" rx="2.5" ry="2" fill="#e8a878"/>
        <ellipse cx="21.5" cy="14.5" rx="2.5" ry="2" fill="#e8a878"/>
        <circle cx="15.5" cy="12" r="1.8" fill="#2a1a1f"/>
        <circle cx="20.5" cy="12" r="1.8" fill="#2a1a1f"/>
        <circle cx="16" cy="11.5" r="0.7" fill="white"/>
        <circle cx="21" cy="11.5" r="0.7" fill="white"/>
        <ellipse cx="12.5" cy="7.5" rx="2.5" ry="3" fill="#c87a50"/>
        <ellipse cx="23.5" cy="7.5" rx="2.5" ry="3" fill="#c87a50"/>
        <rect x="16" y="15.5" width="2" height="2.5" rx="0.5" fill="#f8f0e0"/>
        <rect x="18.5" y="15.5" width="2" height="2.5" rx="0.5" fill="#f8f0e0"/>
        <ellipse cx="18" cy="31" rx="7" ry="3.5" fill="#8b4c30"/>
        <path d="M17.5 9 C17.5 8 16 7 15 8 C14 9 15 10.5 17.5 12 C20 10.5 21 9 20 8 C19 7 17.5 8 17.5 9Z" fill="#f06292"/>
      </svg>
      <span class="nav-logo-name">COS<span>NIMA</span></span>
    </a>
    <div class="nav-links">
      <a href="../index.html">Home</a>
      <a href="../listing/listings.html">Browse</a>

      <a href="../listing/create-listing.html" id="sell-link" style="display:none;">+ Sell / Rent</a>
    </div>
    <div class="nav-right">
      <button class="theme-btn" id="theme-btn" aria-label="Toggle dark mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>

  </nav>

<!-- MESSAGES LAYOUT -->
<div class="messages-page">
  <div class="messages-layout" id="messages-layout">

    <!-- Left: Conversations -->
    <aside class="conversations-panel" role="complementary" aria-label="Conversations">
      <div class="conversations-header">
        <h2>Messages</h2>
        <div class="convo-search-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" id="convo-search" placeholder="Search conversations…" autocomplete="off" aria-label="Search conversations">
        </div>
      </div>
      <div class="conversations-list" id="conversations-list" role="list" aria-label="Your conversations"></div>
    </aside>

    <!-- Right: Chat -->
    <section class="chat-panel" role="main">

      <!-- Empty state (no conversation selected) -->
      <div class="chat-empty-state" id="chat-empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
        </svg>
        <h3>Select a conversation</h3>
        <p>Choose a conversation on the left to start chatting, or message a seller from any listing.</p>
        <a href="../listing/listings.html" class="btn btn-outline" style="margin-top:var(--space-md);padding:0.5rem 1.1rem;font-size:0.84rem;">Browse Listings</a>
      </div>

      <!-- Active chat (hidden until conversation selected) -->
      <div id="chat-main" style="display:none;flex:1;flex-direction:column;overflow:hidden;height:100%;">

        <!-- Listing context banner -->
        <a href="#" class="chat-listing-banner" id="chat-listing-banner" style="display:none;" aria-label="View listing">
          <div class="chat-listing-thumb" id="chat-listing-thumb">
            <div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg-alt);color:var(--ink-faint);">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
            </div>
          </div>
          <div class="chat-listing-info">
            <div class="chat-listing-title" id="chat-listing-title">Listing</div>
            <div class="chat-listing-price" id="chat-listing-price"></div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--ink-faint);flex-shrink:0;"><path stroke-linecap="round" d="M9 18l6-6-6-6"/></svg>
        </a>

        <!-- Chat header -->
        <div class="chat-header">
          <button class="chat-header-back" id="chat-back-btn" aria-label="Back to conversations">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="chat-header-avatar" id="chat-header-avatar-wrap">
            <span id="chat-header-avatar-text">?</span>
          </div>
          <div class="chat-header-info">
            <div class="chat-header-name" id="chat-other-name">Loading…</div>
            <div class="chat-header-listing" id="chat-listing-label"></div>
          </div>
          <div class="chat-header-actions">
            <button class="chat-action-btn" onclick="viewListingFromChat()" id="chat-view-listing-btn" style="display:none;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
              </svg>
              <span>View Listing</span>
            </button>
          </div>
        </div>

        <!-- Messages area -->
        <div class="messages-area" id="messages-area" role="log" aria-label="Messages" aria-live="polite"></div>

        <!-- Chat input -->
        <div class="chat-input-area">
          <div class="chat-input-actions" id="chat-input-actions" style="display:none;padding:0 var(--space-sm) var(--space-xs);">
            <button class="btn btn-offer-action" onclick="openOfferInChat()" style="padding:0.4rem 0.8rem;font-size:0.75rem;background:var(--accent);color:white;border:none;border-radius:var(--radius);">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
              </svg>
              Make Offer
            </button>
            <button class="btn btn-rent-action" onclick="openRentInChat()" style="padding:0.4rem 0.8rem;font-size:0.75rem;background:var(--beaver);color:white;border:none;border-radius:var(--radius);">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
              </svg>
              Rent Request
            </button>
          </div>
          <div class="chat-input-wrap">
            <textarea
              class="chat-textarea"
              id="chat-textarea"
              placeholder="Type a message…"
              rows="1"
              maxlength="2000"
              aria-label="Message input"
            ></textarea>
            <button class="chat-send-btn" id="chat-send-btn" onclick="sendMessage()" disabled aria-label="Send message">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
              </svg>
            </button>
          </div>
        </div>

      </div><!-- /chat-main -->

    </section>

  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/messages.js"></script>
<script src="../js/messages-sort-rating-patch.js"></script>
<script src="../js/reports.js"></script>
<script src="../js/report-buttons-patch.js"></script>
<script>
function viewListingFromChat() {
  const banner = document.getElementById('chat-listing-banner');
  if (banner && banner.href && banner.href !== '#') {
    window.location.href = banner.href;
  }
}
</script>
</body>
</html>
