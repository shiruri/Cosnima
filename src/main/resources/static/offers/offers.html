      </svg>
      <span class="nav-logo-name">COS<span>NIMA</span></span>
    </a>

    <div class="nav-links">
      <a href="../index.html">Home</a>

<!-- Mobile drawer -->
<div class="mobile-nav" id="mobile-nav" role="dialog" aria-label="Mobile menu">
  <nav class="mobile-nav-links">
    <a href="../index.html">Home</a>
    <a href="../listing/listings.html">Browse</a>

  </nav>
  <div class="mobile-nav-actions" id="mobile-auth"></div>
</div>
<div class="mobile-overlay" id="mobile-overlay"></div>

<!-- ── PAGE CONTENT ── -->
<div class="offers-page">
  <div class="container">

    <!-- Header -->
    <div class="offers-page-header">
      <div style="display:flex;align-items:center;gap:var(--space-md);flex-wrap:wrap;justify-content:space-between;">
        <div>
          <p class="section-label">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
            </svg>
            Offers Dashboard
          </p>
          <h1>My Offers</h1>
          <p style="margin-top:4px;">Track offers you've sent to sellers.</p>
        </div>
        <div style="display:flex;align-items:center;gap:var(--space-sm);">
          <span id="offers-total-count" style="font-size:0.84rem;font-weight:700;color:var(--ink-muted);"></span>
          <a href="../listing/listings.html" class="btn btn-primary" style="padding:0.6rem 1.2rem;font-size:0.84rem;">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px;">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            Browse Listings
          </a>
        </div>
      </div>
    </div>

    <!-- Filter tabs -->
    <div class="offers-filter-tabs" role="tablist">
      <button class="offers-filter-tab active" role="tab" data-filter="ALL">All</button>
      <button class="offers-filter-tab" role="tab" data-filter="PENDING">
        <span style="display:inline-flex;align-items:center;gap:5px;">
          <span style="width:6px;height:6px;border-radius:50%;background:#e67e22;display:inline-block;"></span>
          Pending
        </span>
      </button>
      <button class="offers-filter-tab" role="tab" data-filter="ACCEPTED">
        <span style="display:inline-flex;align-items:center;gap:5px;">
          <span style="width:6px;height:6px;border-radius:50%;background:#27ae60;display:inline-block;"></span>
          Accepted
        </span>
      </button>
      <button class="offers-filter-tab" role="tab" data-filter="REJECTED">
        <span style="display:inline-flex;align-items:center;gap:5px;">
          <span style="width:6px;height:6px;border-radius:50%;background:var(--error);display:inline-block;"></span>
          Declined
        </span>
      </button>
      <button class="offers-filter-tab" role="tab" data-filter="CANCELLED">Cancelled</button>
    </div>

    <!-- Offers list -->
    <div id="my-offers-container">
      <!-- Populated by offers.js -->
    </div>

  </div>
</div>

<!-- ── FOOTER ── -->
<footer class="footer" style="margin-top:var(--space-3xl);">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 Cosnima. Made with care in the Philippines.</p>
      <div class="footer-bottom-links">
        <a href="#">Terms</a>
        <a href="#">Privacy</a>
      </div>
    </div>
  </div>
</footer>

<script src="../js/api.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/offers.js"></script>
</body>
</html>
