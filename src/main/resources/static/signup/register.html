<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Cosnima</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <script>
    (function() {
      const t = localStorage.getItem('cosnimaTheme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .not-found-wrapper {
      text-align: center;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }
    .not-found-num {
      font-family: var(--font-display);
      font-size: clamp(5rem, 20vw, 9rem);
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .not-found-title { font-size: 1.6rem; color: var(--ink); margin-bottom: 0; }
    .not-found-desc { max-width: 380px; font-size: 0.96rem; color: var(--ink-muted); }
    .not-found-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-top: 0.5rem; }
    .beaver-bounce { animation: beaverBounce 1.2s ease-in-out infinite; }
    @keyframes beaverBounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }
  </style>
</head>
<body>
<div class="not-found-wrapper">
  <!-- Cute beaver SVG -->
  <div class="beaver-bounce" aria-hidden="true">
    <svg width="100" height="100" viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="45" cy="52" rx="22" ry="20" fill="#c87a50"/>
      <ellipse cx="45" cy="56" rx="13" ry="12" fill="#e8a878"/>
      <ellipse cx="45" cy="32" rx="18" ry="16" fill="#c87a50"/>
      <ellipse cx="36" cy="36" rx="6" ry="5" fill="#e8a878"/>
      <ellipse cx="54" cy="36" rx="6" ry="5" fill="#e8a878"/>
      <!-- Sad eyes -->
      <path d="M36 27 Q39 25 42 27" stroke="#2a1a1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M48 27 Q51 25 54 27" stroke="#2a1a1f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <circle cx="39" cy="30" r="3.5" fill="#2a1a1f"/>
      <circle cx="51" cy="30" r="3.5" fill="#2a1a1f"/>
      <circle cx="40" cy="29" r="1.2" fill="white"/>
      <circle cx="52" cy="29" r="1.2" fill="white"/>
      <!-- Teardrop -->
      <ellipse cx="36" cy="35" rx="2" ry="3" fill="#a8d4f5" opacity="0.8"/>
      <ellipse cx="54" cy="35" rx="2" ry="3" fill="#a8d4f5" opacity="0.8"/>
      <ellipse cx="45" cy="36" rx="4" ry="3" fill="#8b4c30"/>
      <rect x="41" y="38" width="4" height="5" rx="1" fill="#f8f0e0"/>
      <rect x="46" y="38" width="4" height="5" rx="1" fill="#f8f0e0"/>
      <ellipse cx="31" cy="19" rx="6" ry="7" fill="#c87a50"/>
      <ellipse cx="31" cy="19" rx="3.5" ry="4.5" fill="#e8a878"/>
      <ellipse cx="59" cy="19" rx="6" ry="7" fill="#c87a50"/>
      <ellipse cx="59" cy="19" rx="3.5" ry="4.5" fill="#e8a878"/>
      <ellipse cx="26" cy="55" rx="6" ry="10" fill="#c87a50" transform="rotate(-15 26 55)"/>
      <ellipse cx="64" cy="55" rx="6" ry="10" fill="#c87a50" transform="rotate(15 64 55)"/>
      <ellipse cx="36" cy="72" rx="9" ry="5" fill="#8b4c30"/>
      <ellipse cx="54" cy="72" rx="9" ry="5" fill="#8b4c30"/>
      <!-- Tail -->
      <ellipse cx="45" cy="78" rx="16" ry="7" fill="#8b4c30"/>
      <path d="M33 77 Q45 72 57 77" stroke="#6b3420" stroke-width="1.2" fill="none" opacity="0.5"/>
      <!-- Lost sign -->
      <rect x="60" y="38" width="26" height="18" rx="3" fill="white" stroke="#e0b8c4" stroke-width="1.5"/>
      <text x="73" y="51" text-anchor="middle" font-size="8" fill="#e8547a" font-family="sans-serif" font-weight="bold">LOST</text>
    </svg>
  </div>

  <div class="not-found-num">404</div>
  <h1 class="not-found-title">Page not found</h1>
  <p class="not-found-desc">
    Oops! This beaver got lost looking for that page.
    Looks like it wandered off somewhere we can't find.
  </p>
  <div class="not-found-actions">
    <a href="../index.html" class="btn btn-primary">Go home</a>
    <a href="../listing/listings.html" class="btn btn-outline">Browse listings</a>
  </div>
</div>
</body>
</html>
