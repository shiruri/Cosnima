<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Cosnima</title>
  <link rel="stylesheet" href="../css/variables.css">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div id="loading-screen">
    <div class="loader"></div>
  </div>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="../index.html" class="nav-brand">
        <svg class="nav-logo" viewBox="0 0 24 24" fill="none"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke="currentColor" stroke-width="2"/></svg>
        <span>Cosnima</span>
      </a>
      <div class="nav-links">
        <a href="../index.html">Home</a>
        <a href="../listing/listings.html">Listings</a>
        <a href="admin.html" class="active">Admin</a>
      </div>
      <div class="nav-auth" id="nav-auth"></div>
    </div>
  </nav>

  <main class="admin-main">
    <!-- Stats Cards -->
    <section class="admin-stats" id="stats-section">
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--beaver);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-total-users">—</span>
          <span class="stat-label">Total Users</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--accent);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H8m8 0v-2a3 3 0 00-5.356-1.857M8 20H3v-2a3 3 0 015.356-1.857M8 20v-2a3 3 0 00-3-3h0m8 0V9a3 3 0 00-3-3H8"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-new-users">—</span>
          <span class="stat-label">New Today</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--success);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 012-2h2a2 2 0 012 2 0 012 2h0a2 2 0 012 2h2a2 2 0 012-2"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-listings">—</span>
          <span class="stat-label">Listings</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--warning);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-rentals">—</span>
          <span class="stat-label">Rentals</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--loopy-lemon);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-messages">—</span>
          <span class="stat-label">Messages</span>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:var(--error);">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        </div>
        <div class="stat-info">
          <span class="stat-value" id="stat-reports">—</span>
          <span class="stat-label">Reports</span>
        </div>
      </div>
    </section>

    <!-- Tabs -->
    <section class="admin-tabs">
      <button class="admin-tab active" data-tab="users" onclick="switchTab('users')">Users</button>
      <button class="admin-tab" data-tab="listings" onclick="switchTab('listings')">Listings</button>
      <button class="admin-tab" data-tab="reports" onclick="switchTab('reports')">Reports</button>
    </section>

    <!-- Users Section -->
    <section id="users-section" class="admin-section active">
      <div class="section-header">
        <h2>Users Management</h2>
        <input type="search" id="user-search" placeholder="Search users..." class="search-input" oninput="searchUsers()">
      </div>
      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>User</th>
              <th>Role</th>
              <th>Status</th>
              <th>Joined</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="5" class="loading-cell">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="users-pagination"></div>
    </section>

    <!-- Listings Section -->
    <section id="listings-section" class="admin-section">
      <div class="section-header">
        <h2>Listings Management</h2>
        <input type="search" id="listing-search" placeholder="Search listings..." class="search-input" oninput="searchListings()">
      </div>
      <div class="table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Listing</th>
              <th>Seller</th>
              <th>Type</th>
              <th>Status</th>
              <th>Views</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="listings-table-body">
            <tr><td colspan="6" class="loading-cell">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="pagination" id="listings-pagination"></div>
    </section>

    <!-- Reports Section -->
    <section id="reports-section" class="admin-section">
      <div class="section-header">
        <h2>Reports</h2>
      </div>
      <div class="reports-list" id="reports-list">
        <div class="loading-cell">Loading...</div>
      </div>
    </section>
  </main>

  <!-- Ban Modal -->
  <div id="ban-modal" class="modal" style="display:none;">
    <div class="modal-backdrop" onclick="closeBanModal()"></div>
    <div class="modal-content">
      <h3>Ban User</h3>
      <form id="ban-form">
        <input type="hidden" id="ban-user-id">
        <div class="form-group">
          <label>Reason</label>
          <select id="ban-reason" required>
            <option value="">Select reason...</option>
            <option value="SCAM">Scam</option>
            <option value="HARASSMENT">Harassment</option>
            <option value="FAKE_ITEM">Fake Item</option>
            <option value="INAPPROPRIATE">Inappropriate Content</option>
            <option value="SPAM">Spam</option>
            <option value="OTHER">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Additional Notes (optional)</label>
          <textarea id="ban-notes" rows="3" placeholder="Any additional details..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" onclick="closeBanModal()">Cancel</button>
          <button type="submit" class="btn btn-danger">Ban User</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container"></div>

  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script src="admin.js"></script>
</body>
</html>
