<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — Cosnima</title>
    <link rel="stylesheet" href="../css/variables.css">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/home.css">
    <link rel="stylesheet" href="../css/profile.css">
    <script>
        (function() {
            var t = localStorage.getItem('cosnimaTheme') || 'light';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar" role="navigation">
    <div class="nav-inner">
        <a href="../index.html" class="nav-logo" aria-label="Cosnima home">
            <div class="nav-logo-img">
                <img src="../image/logo.png" alt="Cosnima" onerror="this.parentElement.style.background='var(--bg-alt)'">
            </div>
            <span class="nav-logo-name">COSNIMA</span>
        </a>
        <nav class="nav-links">
            <a href="../index.html#listings">Browse</a>
            <a href="#">Sell / Rent</a>
            <a href="#">Conventions</a>
            <a href="#">Community</a>
        </nav>
        <div class="nav-right">
            <button class="theme-btn" id="theme-btn" aria-label="Toggle dark mode">
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                </svg>
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                    <circle cx="12" cy="12" r="5"/>
                    <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                </svg>
            </button>
            <div id="nav-auth">
                <a href="../login/login.html" class="btn btn-outline btn-nav">Log in</a>
                <a href="../signup/register.html" class="btn btn-primary btn-nav">Register</a>
            </div>
            <button class="nav-hamburger" id="hamburger" aria-label="Open menu" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </div>
</nav>

<div class="mobile-nav" id="mobile-nav">
    <nav class="mobile-nav-links">
        <a href="../index.html#listings">Browse</a>
        <a href="#">Sell / Rent</a>
        <a href="#">Conventions</a>
        <a href="#">Community</a>
    </nav>
    <div class="mobile-nav-actions" id="mobile-auth">
        <a href="../login/login.html" class="btn btn-outline">Log in</a>
        <a href="../signup/register.html" class="btn btn-primary">Register</a>
    </div>
</div>

<!-- Error state -->
<div id="page-error" style="display:none;padding:3rem;text-align:center;">
    <p style="color:var(--ink-muted);font-size:1rem;"></p>
    <a href="../index.html" class="btn btn-outline" style="margin-top:1.5rem;">Back to Home</a>
</div>

<!-- PUBLIC PROFILE HEADER -->
<section class="public-profile-header">
    <div class="container">
        <div class="public-profile-inner" id="profile-header-area">

            <div class="profile-avatar" id="profile-avatar">
                <div class="profile-avatar-placeholder">?</div>
            </div>

            <div class="profile-info">
                <h1 id="profile-username" style="opacity:0.3">Loading...</h1>
                <p class="profile-bio" id="profile-bio"></p>
            </div>

            <div class="profile-stats">
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-listings">—</span>
                    <span class="profile-stat-label">Listings</span>
                </div>
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-followers">—</span>
                    <span class="profile-stat-label">Followers</span>
                </div>
                <div class="profile-stat">
                    <span class="profile-stat-num" id="stat-rating">—</span>
                    <span class="profile-stat-label">Rating</span>
                </div>
            </div>

            <div class="profile-actions" id="profile-actions">
                <!-- Injected by JS -->
            </div>

        </div>
    </div>
</section>

<!-- PROFILE CONTENT -->
<section class="section" style="padding-top:0;">
    <div class="container">

        <div class="profile-tabs" role="tablist">
            <button class="profile-tab active" data-tab="listings" onclick="switchTab('listings')">Listings</button>
            <button class="profile-tab" data-tab="reviews" onclick="switchTab('reviews')">Reviews</button>
        </div>

        <div id="listings-content" class="tab-content active">
            <div class="listings-grid" id="profile-listings">
                <div style="text-align:center;padding:var(--space-2xl);color:var(--ink-faint);">
                    <div style="width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--ink);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto var(--space-md)"></div>
                    Loading listings...
                </div>
            </div>
        </div>

        <div id="reviews-content" class="tab-content">
            <div class="empty-state">
                <div class="empty-state-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
                    </svg>
                </div>
                <h3>No reviews yet</h3>
                <p>Reviews will appear here after completed transactions.</p>
            </div>
        </div>

    </div>
</section>

<script src="../js/api.js"></script>
<script src="../js/home.js"></script>
<script>
    /* ============================================
       Public Profile Logic
       ============================================ */
    document.addEventListener('DOMContentLoaded', async () => {
        // Get user ID from URL param: /profile/public.html?id=UUID
        const params = new URLSearchParams(window.location.search);
        const userId = params.get('id');

        if (!userId) {
            showError('No user specified.');
            return;
        }

        try {
            const user = await API.get(`/api/users/${userId}`, false);
            if (!user) throw new Error('User not found.');
            renderPublicProfile(user);
            await loadPublicListings(userId);
        } catch (err) {
            console.error(err);
            showError(err?.message || 'Could not load this profile.');
        }
    });

    function renderPublicProfile(user) {
        // Avatar
        const avatarEl = document.getElementById('profile-avatar');
        if (avatarEl) {
            if (user.avatar) {
                avatarEl.innerHTML = `<img src="${user.avatar}" alt="${user.username}">`;
            } else {
                const initial = user.username ? user.username[0].toUpperCase() : '?';
                avatarEl.innerHTML = `<div class="profile-avatar-placeholder">${initial}</div>`;
            }
        }

        const usernameEl = document.getElementById('profile-username');
        if (usernameEl) { usernameEl.textContent = user.username || 'User'; usernameEl.style.opacity = '1'; }

        const bioEl = document.getElementById('profile-bio');
        if (bioEl) bioEl.textContent = user.bio || '';

        const updateStat = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
        updateStat('stat-listings',  user.listingsCount  || '0');
        updateStat('stat-followers', user.followersCount || '0');
        updateStat('stat-rating',    user.rating         || '5.0');

        // Actions — follow if logged in, or show login prompt
        const actionsEl = document.getElementById('profile-actions');
        if (actionsEl) {
            const isOwn = API.isLoggedIn() && API.getUser()?.id === user.id;
            if (isOwn) {
                actionsEl.innerHTML = `<a href="profile.html" class="btn btn-primary">Edit Profile</a>`;
            } else if (API.isLoggedIn()) {
                actionsEl.innerHTML = `
        <button class="btn btn-primary" id="follow-btn" onclick="toggleFollow('${user.id}')">Follow</button>
        <button class="btn btn-outline" onclick="openMessage('${user.id}')">Message</button>
      `;
            } else {
                actionsEl.innerHTML = `<a href="../login/login.html" class="btn btn-outline">Log in to follow</a>`;
            }
        }
    }

    async function loadPublicListings(userId) {
        const container = document.getElementById('profile-listings');
        if (!container) return;
        try {
            const listings = await API.get(`/api/users/${userId}/listings`, false);
            if (!listings || listings.length === 0) {
                container.innerHTML = `
        <div class="empty-state" style="grid-column:1/-1">
          <div class="empty-state-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7H4a2 2 0 00-2 2v9a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2zM16 3H8a2 2 0 00-2 2v2h12V5a2 2 0 00-2-2z"/>
            </svg>
          </div>
          <h3>No listings yet</h3>
          <p>This user has not listed anything yet.</p>
        </div>`;
                return;
            }
            container.innerHTML = listings.map(l => `
      <article class="listing-card">
        <div class="card-thumb">
          <img src="${l.image || 'https://picsum.photos/seed/${l.id}/400/300'}" alt="${l.title}">
          <div class="card-badges"><span class="badge badge-sell">Listed</span></div>
        </div>
        <div class="card-body">
          <h4 class="card-name">${l.title}</h4>
          <p style="font-size:0.83rem;color:var(--ink-muted);margin-top:var(--space-xs)">${l.description || ''}</p>
        </div>
      </article>
    `).join('');
        } catch (err) {
            container.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <h3>Could not load listings</h3>
        <p>${err?.message || 'Please try again later.'}</p>
      </div>`;
        }
    }

    function switchTab(tabName) {
        document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        const tab     = document.querySelector(`[data-tab="${tabName}"]`);
        const content = document.getElementById(`${tabName}-content`);
        if (tab)     tab.classList.add('active');
        if (content) content.classList.add('active');
    }

    function showError(msg) {
        document.getElementById('page-error').style.display = 'block';
        document.querySelector('#page-error p').textContent = msg;
        document.getElementById('profile-header-area').style.display = 'none';
    }



    function openMessage(userId) {
        // TODO: messaging feature
        alert('Messaging coming soon!');
    }
</script>
</body>
</html>
